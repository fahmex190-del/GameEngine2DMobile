name: Build Offline APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install & Build TSX
      run: |
        npm install
        npm run build 

    - name: Senarai Fail (Untuk Siasatan)
      run: ls -la

    - name: Install Cordova
      run: npm install -g cordova

    - name: Compile to APK
      run: |
        cordova create myapp com.studio.app "AppEngine"
        rm -rf myapp/www/*
        
        # Kita suruh mesin check semua kemungkinan nama folder
        if [ -d "dist" ]; then
          cp -r dist/* myapp/www/
          echo "Guna folder: dist"
        elif [ -d "build" ]; then
          cp -r build/* myapp/www/
          echo "Guna folder: build"
        elif [ -d "out" ]; then
          cp -r out/* myapp/www/
          echo "Guna folder: out"
        else
          echo "Masih tak jumpa folder! Sila check log 'Senarai Fail'."
          exit 1
        fi
        
        cd myapp
        cordova platform add android
        cordova build android

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Engine-APK
        path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
